version: '3.8'

services:
  abacus-db:
    image: postgres:15-alpine
    container_name: abacus_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: abacus_password
      POSTGRES_DB: abacus
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: abacus_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
