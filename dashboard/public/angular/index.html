<body>
  <app-root></app-root>
  <script>
    (function() {
      var script = document.createElement('script');
      var port = window.location.port;
      if (port === '4200' || !port) {
        // If we are on Angular dev server (4200), try port 8080 first
        script.src = window.location.protocol + '//' + window.location.hostname + ':8080/tracker.js';
        script.onerror = function() {
          // Fallback to port 8081 if 8080 fails
          var fallbackScript = document.createElement('script');
          fallbackScript.src = window.location.protocol + '//' + window.location.hostname + ':8081/tracker.js';
          document.body.appendChild(fallbackScript);
        };
      } else {
        // If served by backend, load relatively
        script.src = '/tracker.js';
      }
      document.body.appendChild(script);
    })();
  </script>
<script src="main-56KI3ATH.js" type="module"></script></body>
</html>
