<!doctype html>
<html lang="en" data-beasties-container>
<head>
  <meta charset="utf-8">
  <title>Event Logger</title>
  <base href="./">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Outfit:wght@500;600;700;800&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="styles-FRDAFKAN.css" media="print" onload="this.media='all'"><noscript><link rel="stylesheet" href="styles-FRDAFKAN.css"></noscript></head>
<body>
  <app-root></app-root>
  <script>
    (function() {
      var script = document.createElement('script');
      var hostname = window.location.hostname;
      if (hostname === 'localhost' || hostname === '127.0.0.1') {
        var port = window.location.port;
        if (port === '4200') {
          script.src = 'http://localhost:8080/tracker.js';
          script.onerror = function() {
            var fallbackScript = document.createElement('script');
            fallbackScript.src = 'http://localhost:8081/tracker.js';
            document.body.appendChild(fallbackScript);
          };
        } else {
          script.src = '/tracker.js';
        }
      } else {
        script.src = '/tracker.js';
      }
      document.body.appendChild(script);
    })();
  </script>
<script src="main-IQPCWVXC.js" type="module"></script></body>
</html>
