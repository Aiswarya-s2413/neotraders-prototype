<header class="top-header animate-fade-in-down">
  <div class="header-titles">
    <h1 class="gradient-text">Form</h1>
    <p class="subtitle">Enter test data to verify real-time database ingestion from the Angular client.</p>
  </div>
</header>

<div class="sandbox-grid" style="grid-template-columns: 1fr; max-width: 600px; margin: 0 auto;">
  <div class="glass-panel form-section animate-fade-in-up">
    <h3 class="form-title">Trigger Event</h3>
    
    <form (ngSubmit)="onSubmit()" #eventForm="ngForm" class="checkbox-container">
      <div class="form-group">
        <label class="form-label" for="eventName">Event Name / Reporter</label>
        <input type="text" id="eventName" name="name" [(ngModel)]="name" required placeholder="e.g. user_signed_up, system_health_check" class="input-text">
      </div>

      <div class="form-group">
        <label class="form-label">Event Categories (Checkboxes)</label>
        <div class="checkbox-container">
          <label class="checkbox-label">
            <input type="checkbox" name="category_a" [(ngModel)]="category_a" class="checkbox-input">
            <span>Category A: Authentication Event</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="category_b" [(ngModel)]="category_b" class="checkbox-input">
            <span>Category B: High Intent Score Action</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="category_c" [(ngModel)]="category_c" class="checkbox-input">
            <span>Category C: Performance Alert</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="eventNotes">Payload Notes</label>
        <textarea id="eventNotes" name="notes" [(ngModel)]="notes" rows="4" placeholder="Optional descriptions or metadata notes..." class="input-textarea"></textarea>
      </div>

      <div *ngIf="statusMessage" class="status-message" [ngClass]="{
        'status-success': statusType === 'success',
        'status-error': statusType === 'error',
        'status-info': statusType === 'info'
      }">
        {{ statusMessage }}
      </div>

      <button type="submit" [disabled]="!eventForm.form.valid" class="btn btn-primary glow-button btn-full" style="margin-top: 1.5rem;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Submit to DB
      </button>
    </form>
  </div>
</div>
