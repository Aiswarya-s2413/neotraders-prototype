<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Logging Sandbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Custom layout adjustments for Sandbox split grid */
        .sandbox-grid {
            display: grid;
            grid-template-columns: 1fr 1.8fr;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 1024px) {
            .sandbox-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-section {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-title {
            font-size: 1.25rem;
            font-weight: 600;
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 1rem;
            margin-bottom: 0.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .input-text, .input-textarea {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-glass);
            color: white;
            padding: 0.85rem 1rem;
            border-radius: 10px;
            outline: none;
            font-size: 0.95rem;
            transition: all 0.3s;
            font-family: var(--font-sans);
        }

        .input-text:focus, .input-textarea:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
        }

        .checkbox-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin: 0.5rem 0;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            user-select: none;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background-color 0.2s;
        }

        .checkbox-label:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }

        .checkbox-input {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 1.5px solid var(--border-glass);
            border-radius: 6px;
            background-color: rgba(0, 0, 0, 0.2);
            display: grid;
            place-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .checkbox-input:checked {
            background: var(--brand-gradient);
            border-color: transparent;
            box-shadow: 0 0 10px var(--accent-purple-glow);
        }

        .checkbox-input::before {
            content: "";
            width: 10px;
            height: 10px;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            background-color: white;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .checkbox-input:checked::before {
            transform: scale(1);
        }

        .category-badge {
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid transparent;
            margin-right: 4px;
            display: inline-block;
        }

        .badge-a { background: rgba(59, 130, 246, 0.1); color: var(--accent-blue); border-color: rgba(59, 130, 246, 0.3); }
        .badge-b { background: rgba(139, 92, 246, 0.1); color: var(--accent-purple); border-color: rgba(139, 92, 246, 0.3); }
        .badge-c { background: rgba(16, 185, 129, 0.1); color: var(--accent-green); border-color: rgba(16, 185, 129, 0.3); }
        .badge-none { background: rgba(161, 161, 170, 0.1); color: var(--text-secondary); border-color: rgba(161, 161, 170, 0.3); }

        .btn-full {
            width: 100%;
            justify-content: center;
            background: var(--brand-gradient);
        }

        .status-message {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.9rem;
            display: none;
            animation: fadeInUp 0.3s ease-out;
        }

        .status-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass-panel animate-fade-in-left">
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    Sales Triggers
                </a>
                <a href="test.html" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
                    Event Sandbox
                </a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-header animate-fade-in-down">
                <div class="header-titles">
                    <h1 class="gradient-text">Event Logging Sandbox</h1>
                    <p class="subtitle">Interactive event generator to verify real-time ingestion pipelines and database storage.</p>
                </div>
            </header>

            <div class="sandbox-grid">
                <!-- Left: Form Card -->
                <div class="glass-panel form-section animate-fade-in-up delay-1">
                    <h3 class="form-title">Trigger Sandbox Event</h3>
                    
                    <form id="sandboxForm" class="checkbox-container">
                        <div class="form-group">
                            <label class="form-label" for="eventName">Event Name / Reporter</label>
                            <input type="text" id="eventName" required placeholder="e.g. user_signed_up, system_health_check" class="input-text">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Event Categories (Checkboxes)</label>
                            <div class="checkbox-container">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="catA" class="checkbox-input">
                                    <span>Category A: Authentication Event</span>
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" id="catB" class="checkbox-input">
                                    <span>Category B: High Intent Score Action</span>
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" id="catC" class="checkbox-input">
                                    <span>Category C: Performance Alert</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="elementId">Element ID (Optional)</label>
                            <input type="text" id="elementId" placeholder="e.g. btn_upgrade_submit, checkout_link" class="input-text">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="eventNotes">Payload Notes</label>
                            <textarea id="eventNotes" rows="4" placeholder="Optional descriptions or metadata notes..." class="input-textarea"></textarea>
                        </div>

                        <div id="statusMessage" class="status-message"></div>

                        <button type="submit" class="btn btn-primary glow-button btn-full">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                            Dispatch Event to DB
                        </button>
                    </form>
                </div>

                <!-- Right: Database Records Grid -->
                <div class="table-container glass-panel animate-fade-in-up delay-2">
                    <div class="table-header">
                        <h3>Captured DB Events</h3>
                        <div class="table-filters">
                            <div class="search-wrapper">
                                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                                <input type="text" id="eventSearchInput" placeholder="Search events..." class="search-input">
                            </div>
                        </div>
                    </div>
                    <div class="table-wrapper">
                        <table id="eventsTable">
                            <thead>
                                <tr>
                                    <th style="width: 80px;">ID</th>
                                    <th>Event / Reporter</th>
                                    <th>Categories</th>
                                    <th>Element ID</th>
                                    <th>Notes</th>
                                    <th>Timestamp</th>
                                </tr>
                            </thead>
                            <tbody id="eventsTableBody">
                                <tr>
                                    <td colspan="6" class="loading-cell">
                                        <div class="spinner-container">
                                            <div class="spinner"></div>
                                            <span class="spinner-text gradient-text">Fetching records from DB...</span>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="test.js"></script>
</body>
</html>
